<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Champions - Coming Soon</title>
    <meta name="description" content="פלטפורמת סוכני AI לעסקים - בקרוב">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #4a148c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3), transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.2), transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(0, 219, 222, 0.2), transparent 50%);
            animation: gradient-shift 15s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ffd700, #ffeb3b, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.5rem;
            margin-bottom: 3rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .countdown-text {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 4rem;
            flex-wrap: wrap;
        }

        .feature {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }

        .feature:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .feature-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .contact {
            margin-top: 4rem;
            opacity: 0.7;
            font-size: 1rem;
        }

        .contact a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        .login-link {
            position: fixed;
            top: 24px;
            left: 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 10px 20px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            z-index: 10;
        }

        .login-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .login-link svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 768px) {
            .logo { font-size: 3rem; }
            h1 { font-size: 2rem; }
            .tagline { font-size: 1.2rem; }
            .features { gap: 1rem; }
            .feature { padding: 1rem 1.5rem; }
            .login-link {
                top: 16px;
                left: 16px;
                padding: 8px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <a href="/login.html" class="login-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10,17 15,12 10,7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        <span>התחברות</span>
    </a>

    <div class="container">
        <div class="logo">🏆 Portal Champions</div>
        <h1>פלטפורמת סוכני AI<br>לעסקים שמובילים</h1>
        <p class="tagline">בקרוב - חוויית אוטומציה חכמה שמשנה את כללי המשחק</p>
        <p class="countdown-text">🚀 משהו גדול בדרך אליכם</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <div class="feature-title">סוכני AI חכמים</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-title">אוטומציה מלאה</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-title">תובנות בזמן אמת</div>
            </div>
        </div>

        <div class="contact">
            <p>למידע נוסף או שותפויות:</p>
            <a href="mailto:its@ronohana.co.il">its@ronohana.co.il</a>
        </div>
    </div>
</body>
</html>
