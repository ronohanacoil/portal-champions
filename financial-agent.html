<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוכן פיננסי - Portal Champions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Premium light SaaS theme - financial control room feel */
            --bg: #f7f8fa;
            --bg-card: #ffffff;
            --bg-hover: #f0f2f5;
            --sidebar-bg: #ffffff;
            --sidebar-active: #eef2ff;
            --text: #0f172a;
            --text-soft: #475569;
            --muted: #94a3b8;
            --border: #e5e7eb;
            --border-strong: #cbd5e1;
            --accent: #3b82f6;
            --accent-soft: #dbeafe;
            --success: #10b981;
            --success-soft: #d1fae5;
            --warning: #f59e0b;
            --warning-soft: #fef3c7;
            --error: #ef4444;
            --error-soft: #fee2e2;
            --info: #6366f1;
            --info-soft: #e0e7ff;
        }

        body {
            font-family: 'Heebo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            font-size: 14px;
        }

        .layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            height: 100vh;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border);
            padding: 16px 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 8px 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-soft);
            width: 28px; height: 28px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .back-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .back-btn svg { width: 14px; height: 14px; }
        .sidebar-title { font-size: 14px; font-weight: 700; color: var(--text); }
        .sidebar-subtitle { font-size: 10px; color: var(--muted); margin-top: 2px; }

        .nav-group-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            font-weight: 600;
            padding: 12px 12px 6px;
        }

        .nav-tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-soft);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.12s;
            border: none;
            background: transparent;
            font-family: inherit;
            text-align: right;
            width: 100%;
        }
        .nav-tab:hover { background: var(--bg-hover); color: var(--text); }
        .nav-tab.active { background: var(--sidebar-active); color: var(--accent); font-weight: 600; }
        .nav-tab .nav-icon { font-size: 15px; line-height: 1; flex-shrink: 0; width: 18px; text-align: center; }
        .nav-tab .nav-badge {
            margin-right: auto;
            background: var(--accent);
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 700;
        }

        /* ============ MAIN ============ */
        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }
        .topbar {
            background: var(--bg-card);
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-title h1 { font-size: 18px; font-weight: 700; color: var(--text); }
        .topbar-title p { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .topbar-actions { display: flex; gap: 8px; align-items: center; }
        .btn {
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .btn:hover { background: var(--bg-hover); }
        .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
        .btn.primary:hover { background: #2563eb; }
        .btn.success { background: var(--success); color: white; border-color: var(--success); }
        .btn.danger { background: var(--error); color: white; border-color: var(--error); }
        .btn.sm { padding: 5px 10px; font-size: 11px; }
        .btn.xs { padding: 3px 7px; font-size: 10px; }
        .btn svg { width: 13px; height: 13px; }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

        /* ============ CARDS ============ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
        }
        .card-h {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
        .card-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }

        .grid {
            display: grid;
            gap: 14px;
        }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-cols-5 { grid-template-columns: repeat(5, 1fr); }
        @media (max-width: 1280px) { .grid-cols-5 { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1024px) { .grid-cols-4, .grid-cols-5 { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) {
            .grid-cols-3, .grid-cols-4, .grid-cols-5 { grid-template-columns: repeat(2, 1fr); }
            .grid-cols-2 { grid-template-columns: 1fr; }
        }

        /* KPI cards */
        .kpi {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        .kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
        .kpi-value { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        .kpi-trend {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 5px;
        }
        .kpi-trend.up { background: var(--success-soft); color: var(--success); }
        .kpi-trend.down { background: var(--error-soft); color: var(--error); }
        .kpi-trend.flat { background: var(--bg-hover); color: var(--muted); }
        .kpi-meta { font-size: 11px; color: var(--muted); margin-top: 6px; }

        /* AI insight card */
        .ai-banner {
            background: linear-gradient(135deg, #eef2ff 0%, #ffffff 50%, #eef9ff 100%);
            border: 1px solid var(--info-soft);
            border-radius: 14px;
            padding: 18px 22px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .ai-banner::before {
            content: '✨';
            position: absolute;
            top: -10px;
            left: -10px;
            font-size: 80px;
            opacity: 0.05;
        }
        .ai-banner-h {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--info);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .ai-banner-h::before { content: '🤖'; font-size: 14px; }
        .ai-insight { font-size: 13.5px; line-height: 1.7; color: var(--text); margin-bottom: 6px; }
        .ai-insight + .ai-insight { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
        .ai-insight strong { color: var(--accent); font-weight: 700; }

        /* Tables */
        .table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .table-toolbar {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .table-toolbar h3 { font-size: 14px; font-weight: 700; }
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-input, .filter-select {
            padding: 6px 10px;
            font-size: 12px;
            border: 1px solid var(--border);
            border-radius: 7px;
            background: var(--bg-card);
            color: var(--text);
            font-family: inherit;
            min-width: 120px;
        }
        .filter-input:focus, .filter-select:focus { outline: none; border-color: var(--accent); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
        }
        thead { background: #fafbfc; }
        th, td {
            text-align: right;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-weight: 600;
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        td { color: var(--text); }
        tbody tr:hover { background: #fafbfc; }
        td.num { font-variant-numeric: tabular-nums; font-weight: 500; }
        td.num.neg { color: var(--error); }
        td.num.pos { color: var(--success); }

        /* Status pills */
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .pill.success { background: var(--success-soft); color: var(--success); }
        .pill.warning { background: var(--warning-soft); color: var(--warning); }
        .pill.error { background: var(--error-soft); color: var(--error); }
        .pill.info { background: var(--info-soft); color: var(--info); }
        .pill.neutral { background: var(--bg-hover); color: var(--text-soft); }
        .pill.accent { background: var(--accent-soft); color: var(--accent); }

        .action-icons {
            display: inline-flex;
            gap: 4px;
        }
        .icon-action {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 6px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-soft);
            transition: all 0.15s;
        }
        .icon-action:hover { background: var(--accent); color: white; border-color: var(--accent); }

        /* Bar chart (simple CSS) */
        .bar-chart { display: flex; flex-direction: column; gap: 8px; }
        .bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .bar-label { min-width: 130px; color: var(--text-soft); }
        .bar-track { flex: 1; height: 8px; background: var(--bg-hover); border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
        .bar-value { min-width: 90px; text-align: left; font-weight: 600; font-variant-numeric: tabular-nums; }

        /* Vertical bars chart */
        .vbar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 160px;
            padding: 8px 0;
        }
        .vbar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .vbar-group { width: 100%; display: flex; gap: 3px; align-items: flex-end; height: 100%; }
        .vbar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; transition: all 0.3s; }
        .vbar.income { background: var(--success); }
        .vbar.expense { background: var(--accent); }
        .vbar-label { font-size: 10px; color: var(--muted); }

        /* List items */
        .list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item-text { flex: 1; }
        .list-item-title { font-weight: 600; color: var(--text); }
        .list-item-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .list-item-val { font-weight: 700; font-variant-numeric: tabular-nums; }

        /* Insight card / action card */
        .action-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-right: 4px solid var(--accent);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }
        .action-card.priority-high { border-right-color: var(--warning); }
        .action-card.priority-critical { border-right-color: var(--error); }
        .action-card.priority-low { border-right-color: var(--muted); }
        .action-card-h { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
        .action-card-title { font-weight: 700; font-size: 13.5px; }
        .action-card-desc { font-size: 12.5px; color: var(--text-soft); line-height: 1.55; }
        .action-card-meta { display: flex; gap: 12px; margin-top: 10px; font-size: 11px; color: var(--muted); }
        .action-card-buttons { display: flex; gap: 6px; margin-top: 10px; }

        /* Section header */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            margin-top: 8px;
        }

        /* Empty / placeholder */
        .placeholder-zone {
            background: var(--bg-card);
            border: 2px dashed var(--border-strong);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            color: var(--muted);
        }
        .placeholder-zone .ph-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.6; }
        .placeholder-zone .ph-title { font-size: 14px; font-weight: 600; color: var(--text-soft); margin-bottom: 4px; }
        .placeholder-zone .ph-sub { font-size: 12px; }

        /* Disclaimer */
        .disclaimer {
            background: var(--warning-soft);
            border: 1px solid #fbbf24;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 11.5px;
            color: #92400e;
            margin: 10px 0 16px;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .disclaimer::before { content: '⚠️'; flex-shrink: 0; }

        /* Tab pills (for sub-tabs inside a screen) */
        .subtabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0;
        }
        .subtab {
            padding: 8px 14px;
            font-size: 12.5px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-soft);
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            font-family: inherit;
            font-weight: 500;
        }
        .subtab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

        /* Drag-drop zone */
        .drop-zone {
            background: var(--bg-card);
            border: 2px dashed var(--border-strong);
            border-radius: 10px;
            padding: 28px;
            text-align: center;
            color: var(--text-soft);
            font-size: 13px;
        }
        .drop-zone:hover { border-color: var(--accent); background: var(--accent-soft); }
        .drop-zone .dz-icon { font-size: 28px; margin-bottom: 6px; }

        /* Scenarios */
        .scenario-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        .scenario-card.optimistic { border-top: 3px solid var(--success); }
        .scenario-card.realistic { border-top: 3px solid var(--accent); }
        .scenario-card.conservative { border-top: 3px solid var(--warning); }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar {
                position: fixed;
                top: 0; right: 0; bottom: 0;
                width: 240px;
                transform: translateX(100%);
                transition: transform 0.2s;
                z-index: 100;
                box-shadow: -4px 0 24px rgba(0,0,0,0.1);
            }
            .sidebar.open { transform: translateX(0); }
            .mobile-menu-btn { display: inline-flex !important; }
            .topbar { padding: 12px 16px; }
            .content { padding: 16px; }
        }
        .mobile-menu-btn { display: none; }
    </style>
</head>
<body>
    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="back-btn" onclick="window.location.href='/dashboard.html'" title="חזרה לדאשבורד">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>
                <div>
                    <div class="sidebar-title">סוכן פיננסי 💰</div>
                    <div class="sidebar-subtitle">CFO דיגיטלי</div>
                </div>
            </div>

            <div class="nav-group-label">סקירה</div>
            <button class="nav-tab active" data-tab="dashboard"><span class="nav-icon">📊</span><span>דאשבורד פיננסי</span></button>

            <div class="nav-group-label">תנועות</div>
            <button class="nav-tab" data-tab="income"><span class="nav-icon">💵</span><span>הכנסות</span></button>
            <button class="nav-tab" data-tab="expenses"><span class="nav-icon">💸</span><span>הוצאות</span></button>
            <button class="nav-tab" data-tab="cashflow"><span class="nav-icon">🌊</span><span>תזרים</span></button>
            <button class="nav-tab" data-tab="collections"><span class="nav-icon">🪙</span><span>גבייה</span><span class="nav-badge">3</span></button>

            <div class="nav-group-label">ניתוחים</div>
            <button class="nav-tab" data-tab="lost"><span class="nav-icon">🔍</span><span>כסף אבוד</span></button>
            <button class="nav-tab" data-tab="profitability"><span class="nav-icon">📈</span><span>רווחיות</span></button>
            <button class="nav-tab" data-tab="adsroi"><span class="nav-icon">🎯</span><span>פרסום מול רווח</span></button>
            <button class="nav-tab" data-tab="forecasts"><span class="nav-icon">🔮</span><span>תחזיות</span></button>

            <div class="nav-group-label">מסמכים</div>
            <button class="nav-tab" data-tab="reconciliation"><span class="nav-icon">🏦</span><span>התאמות בנק</span></button>
            <button class="nav-tab" data-tab="documents"><span class="nav-icon">📄</span><span>מסמכים וחשבוניות</span></button>
            <button class="nav-tab" data-tab="reports"><span class="nav-icon">📑</span><span>דוחות</span></button>

            <div class="nav-group-label">סוכן AI</div>
            <button class="nav-tab" data-tab="chat"><span class="nav-icon">💬</span><span>צ׳אט פיננסי</span></button>
            <button class="nav-tab" data-tab="tasks"><span class="nav-icon">✅</span><span>משימות פיננסיות</span></button>
            <button class="nav-tab" data-tab="alerts"><span class="nav-icon">🔔</span><span>התראות</span><span class="nav-badge">5</span></button>

            <div class="nav-group-label">תצורה</div>
            <button class="nav-tab" data-tab="settings"><span class="nav-icon">⚙️</span><span>הגדרות פיננסיות</span></button>
        </aside>

        <!-- MAIN -->
        <main class="main">
            <header class="topbar">
                <div class="topbar-title">
                    <h1 id="pageTitle">דאשבורד פיננסי</h1>
                    <p id="pageSubtitle">מנהל הכספים הדיגיטלי של העסק שלך</p>
                </div>
                <div class="topbar-actions">
                    <button class="btn mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <button class="btn">📅 מאי 2026 ▾</button>
                    <button class="btn primary">+ הוסף תנועה</button>
                </div>
            </header>

            <div class="content" id="content">
                <!-- All tab panels will be injected here by JS -->
            </div>
        </main>
    </div>

    <script>
        // ============ AUTH GUARD ============
        if (sessionStorage.getItem('pc_authenticated') !== 'true') {
            window.location.href = '/login.html';
        }

        // ============ MOCK DATA - Israeli business ============
        const MOCK = {
            currentMonth: 'מאי 2026',
            kpis: {
                revenue: { value: 184000, trend: +8, prev: 170000 },
                expenses: { value: 123000, trend: +15, prev: 107000 },
                profit: { value: 61000, trend: +12, prev: 54600 },
                margin: { value: 33.2, trend: -2, prev: 35.2 },
                cash: { value: 287400, trend: +5, prev: 273700 },
                openCollections: { value: 42000, trend: +18, prev: 35600 },
                openInvoices: { value: 11, trend: +3, prev: 8 },
                unusualExpenses: { value: 8420, trend: +120, prev: 3830 },
                adRatio: { value: 14.5, trend: +4, prev: 10.5 },
                cpl: { value: 78, trend: -12, prev: 88 },
