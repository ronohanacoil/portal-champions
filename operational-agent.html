<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוכן תפעול - Portal Champions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f7f8fa; --bg-card: #ffffff; --bg-hover: #f0f2f5;
            --sidebar-bg: #ffffff; --sidebar-active: #eef2ff;
            --text: #0f172a; --text-soft: #475569; --muted: #94a3b8;
            --border: #e5e7eb; --border-strong: #cbd5e1;
            --accent: #6366f1; --accent-soft: #e0e7ff;
            --success: #10b981; --success-soft: #d1fae5;
            --warning: #f59e0b; --warning-soft: #fef3c7;
            --error: #ef4444; --error-soft: #fee2e2;
            --info: #3b82f6; --info-soft: #dbeafe;
        }
        body { font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; font-size: 14px; }
        .layout { display: grid; grid-template-columns: 250px 1fr; height: 100vh; }

        .sidebar { background: var(--sidebar-bg); border-left: 1px solid var(--border); padding: 16px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
        .sidebar-header { display: flex; align-items: center; gap: 10px; padding: 8px 8px 16px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
        .back-btn { background: transparent; border: 1px solid var(--border); color: var(--text-soft); width: 28px; height: 28px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
        .back-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .back-btn svg { width: 14px; height: 14px; }
        .sidebar-title { font-size: 14px; font-weight: 700; }
        .sidebar-subtitle { font-size: 10px; color: var(--muted); margin-top: 2px; }
        .nav-group-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; padding: 10px 12px 5px; }
        .nav-tab { display: flex; align-items: center; gap: 10px; padding: 8px 12px; font-size: 13px; font-weight: 500; color: var(--text-soft); border-radius: 8px; cursor: pointer; transition: all 0.12s; border: none; background: transparent; font-family: inherit; text-align: right; width: 100%; }
        .nav-tab:hover { background: var(--bg-hover); color: var(--text); }
        .nav-tab.active { background: var(--sidebar-active); color: var(--accent); font-weight: 600; }
        .nav-tab .nav-icon { font-size: 15px; line-height: 1; flex-shrink: 0; width: 18px; text-align: center; }
        .nav-tab .nav-badge { margin-right: auto; background: var(--accent); color: white; font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 700; }
        .nav-tab .nav-badge.future { background: var(--bg-hover); color: var(--muted); }
        .nav-tab .nav-badge.warn { background: var(--warning); }
        .nav-tab .nav-badge.err { background: var(--error); }

        .main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
        .topbar { background: var(--bg-card); padding: 14px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .topbar-title h1 { font-size: 18px; font-weight: 700; }
        .topbar-title p { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .topbar-actions { display: flex; gap: 8px; align-items: center; }

        .btn { padding: 8px 14px; font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-family: inherit; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
        .btn:hover { background: var(--bg-hover); }
        .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
        .btn.primary:hover { background: #4f46e5; }
        .btn.success { background: var(--success); color: white; border-color: var(--success); }
        .btn.danger { background: var(--error); color: white; border-color: var(--error); }
        .btn.sm { padding: 5px 10px; font-size: 11px; }
        .btn.xs { padding: 3px 7px; font-size: 10px; }

        .content { flex: 1; overflow-y: auto; padding: 24px 28px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
        .card-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .card-title { font-size: 13px; font-weight: 600; }
        .card-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }

        .grid { display: grid; gap: 14px; }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-cols-5 { grid-template-columns: repeat(5, 1fr); }
        .grid-cols-6 { grid-template-columns: repeat(6, 1fr); }
        @media (max-width: 1280px) { .grid-cols-5, .grid-cols-6 { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1024px) { .grid-cols-4, .grid-cols-5, .grid-cols-6 { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .grid-cols-3, .grid-cols-4, .grid-cols-5, .grid-cols-6 { grid-template-columns: repeat(2, 1fr); } .grid-cols-2 { grid-template-columns: 1fr; } }

        .kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
        .kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
        .kpi-value { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .kpi-trend { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 5px; }
        .kpi-trend.up { background: var(--success-soft); color: var(--success); }
        .kpi-trend.down { background: var(--error-soft); color: var(--error); }
        .kpi-trend.flat { background: var(--bg-hover); color: var(--muted); }
        .kpi-meta { font-size: 11px; color: var(--muted); margin-top: 6px; }

        .ai-banner { background: linear-gradient(135deg, #eef2ff 0%, #ffffff 50%, #f3e8ff 100%); border: 1px solid var(--accent-soft); border-radius: 14px; padding: 18px 22px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .ai-banner-h { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .ai-banner-h::before { content: '🤖'; font-size: 14px; }
        .ai-insight { font-size: 13.5px; line-height: 1.7; margin-bottom: 6px; }
        .ai-insight + .ai-insight { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
        .ai-insight strong { color: var(--accent); font-weight: 700; }

        .table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .table-toolbar { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .table-toolbar h3 { font-size: 14px; font-weight: 700; }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .filter-input, .filter-select { padding: 6px 10px; font-size: 12px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg-card); color: var(--text); font-family: inherit; min-width: 120px; }

        table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
        thead { background: #fafbfc; }
        th, td { text-align: right; padding: 10px 14px; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
        tbody tr:hover { background: #fafbfc; }
        td.num { font-variant-numeric: tabular-nums; font-weight: 500; }

        .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
        .pill.success { background: var(--success-soft); color: var(--success); }
        .pill.warning { background: var(--warning-soft); color: var(--warning); }
        .pill.error { background: var(--error-soft); color: var(--error); }
        .pill.info { background: var(--info-soft); color: var(--info); }
        .pill.neutral { background: var(--bg-hover); color: var(--text-soft); }
        .pill.accent { background: var(--accent-soft); color: var(--accent); }

        .action-icons { display: inline-flex; gap: 4px; }
        .icon-action { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; cursor: pointer; font-size: 11px; color: var(--text-soft); transition: all 0.15s; }
        .icon-action:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .action-card { background: var(--bg-card); border: 1px solid var(--border); border-right: 4px solid var(--accent); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
        .action-card.priority-high { border-right-color: var(--warning); }
        .action-card.priority-critical { border-right-color: var(--error); }
        .action-card.priority-low { border-right-color: var(--muted); }
        .action-card-h { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
        .action-card-title { font-weight: 700; font-size: 13.5px; }
        .action-card-desc { font-size: 12.5px; color: var(--text-soft); line-height: 1.55; }
        .action-card-meta { display: flex; gap: 12px; margin-top: 10px; font-size: 11px; color: var(--muted); }
        .action-card-buttons { display: flex; gap: 6px; margin-top: 10px; }

        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; margin-top: 8px; }
        .placeholder-zone { background: var(--bg-card); border: 2px dashed var(--border-strong); border-radius: 12px; padding: 40px 20px; text-align: center; color: var(--muted); }
        .placeholder-zone .ph-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.6; }
        .placeholder-zone .ph-title { font-size: 14px; font-weight: 600; color: var(--text-soft); margin-bottom: 4px; }
        .placeholder-zone .ph-sub { font-size: 12px; }

        .disclaimer { background: var(--warning-soft); border: 1px solid #fbbf24; border-radius: 8px; padding: 10px 14px; font-size: 11.5px; color: #92400e; margin: 10px 0 16px; display: flex; gap: 8px; align-items: flex-start; }
        .disclaimer::before { content: '⚠️'; flex-shrink: 0; }

        .subtabs { display: flex; gap: 6px; margin-bottom: 14px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .subtab { padding: 8px 14px; font-size: 12.5px; background: transparent; border: none; cursor: pointer; color: var(--text-soft); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; font-weight: 500; }
        .subtab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

        .list-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .list-item:last-child { border-bottom: none; }
        .list-item-text { flex: 1; }
        .list-item-title { font-weight: 600; }
        .list-item-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* ============ KANBAN ============ */
        .kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        @media (max-width: 1200px) { .kanban { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .kanban { grid-template-columns: 1fr; } }
        .kanban-col { background: var(--bg-hover); border-radius: 10px; padding: 10px; min-height: 200px; }
        .kanban-col-h { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .kanban-col-count { background: var(--bg-card); color: var(--text); padding: 2px 8px; border-radius: 10px; font-size: 10px; }
        .kanban-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
        .kanban-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); transform: translateY(-1px); }
        .kanban-card-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
        .kanban-card-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
        .kanban-card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 11px; }

        /* ============ CALENDAR ============ */
        .cal-grid { display: grid; grid-template-columns: 60px repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .cal-cell { background: var(--bg-card); padding: 8px; min-height: 60px; font-size: 11px; }
        .cal-cell.header { background: var(--bg-hover); font-weight: 600; text-align: center; font-size: 12px; min-height: auto; padding: 10px 6px; }
        .cal-cell.time { background: var(--bg-hover); color: var(--muted); text-align: center; font-size: 10px; min-height: 60px; padding-top: 8px; }
        .cal-event { background: var(--accent-soft); color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 2px; cursor: pointer; }
        .cal-event:hover { background: var(--accent); color: white; }
        .cal-event.success { background: var(--success-soft); color: var(--success); }
        .cal-event.warning { background: var(--warning-soft); color: var(--warning); }
        .cal-event.error { background: var(--error-soft); color: var(--error); }

        /* ============ INTEGRATION CARDS ============ */
        .int-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
        .int-card-h { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .int-card-icon { font-size: 24px; }
        .int-card-name { font-weight: 700; font-size: 14px; }
        .int-card-desc { font-size: 12px; color: var(--text-soft); line-height: 1.5; min-height: 36px; }
        .int-card-stat { display: flex; justify-content: space-between; padding: 6px 0; font-size: 11px; border-top: 1px dashed var(--border); margin-top: 10px; }

        /* ============ MODAL ============ */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.55); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; animation: fadeIn 0.15s ease-out; }
        .modal-overlay.visible { display: flex; }
        .modal-box { background: var(--bg-card); border-radius: 14px; min-width: 380px; max-width: 760px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.25); display: flex; flex-direction: column; }
        .modal-h { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .modal-h h3 { font-size: 16px; font-weight: 700; }
        .modal-close { background: transparent; border: none; font-size: 22px; color: var(--muted); cursor: pointer; line-height: 1; padding: 4px 8px; border-radius: 6px; }
        .modal-close:hover { background: var(--bg-hover); color: var(--text); }
        .modal-body { padding: 20px 22px; }
        .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-soft); margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13px; background: var(--bg); color: var(--text); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); background: var(--bg-card); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

        /* ============ TOAST ============ */
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; min-width: 240px; max-width: 380px; animation: slideIn 0.2s ease-out; pointer-events: auto; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: none; opacity: 1; } }
        .toast.success { border-right: 3px solid var(--success); }
        .toast.error { border-right: 3px solid var(--error); }
        .toast.warning { border-right: 3px solid var(--warning); }
        .toast.info { border-right: 3px solid var(--accent); }

        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--muted); font-weight: 500; }
        .detail-value { font-weight: 600; }

        /* Chat */
        .chat-shell { display: grid; grid-template-columns: 1fr 280px; gap: 16px; height: calc(100vh - 180px); }
        @media (max-width: 1024px) { .chat-shell { grid-template-columns: 1fr; height: auto; } }
        .chat-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, #eef2ff, #ffffff); }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
        .chat-msg { padding: 12px 14px; border-radius: 10px; font-size: 13px; line-height: 1.65; max-width: 85%; animation: fadeIn 0.18s ease-out; }
        .chat-msg.bot { background: var(--bg-hover); align-self: flex-start; }
        .chat-msg.user { background: var(--accent); color: white; align-self: flex-end; }
        .chat-msg.bot strong { color: var(--accent); }
        .chat-msg .agent-action-card { background: var(--bg-card); border: 1px solid var(--success-soft); border-right: 3px solid var(--success); border-radius: 8px; padding: 10px 12px; margin-top: 10px; font-size: 12px; }
        .chat-msg .agent-action-card strong { color: var(--success); display: block; margin-bottom: 4px; }
        .chat-input-row { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .chat-input-row input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13px; }
        .chat-typing { display: inline-flex; gap: 4px; padding: 12px 14px; background: var(--bg-hover); border-radius: 10px; align-self: flex-start; }
        .chat-typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: typing 1.4s infinite; }
        .chat-typing span:nth-child(2) { animation-delay: 0.15s; }
        .chat-typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typing { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

        /* Health badge */
        .health-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .health-healthy { background: var(--success-soft); color: var(--success); }
        .health-attention { background: var(--warning-soft); color: var(--warning); }
        .health-risk { background: var(--error-soft); color: var(--error); }
        .health-happy { background: var(--info-soft); color: var(--info); }

        .progress-bar { width: 100%; height: 8px; background: var(--bg-hover); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s; }
        .progress-fill.success { background: var(--success); }
        .progress-fill.warning { background: var(--warning); }
        .progress-fill.error { background: var(--error); }

        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .matrix-quadrant { padding: 14px; border-radius: 10px; }
        .matrix-quadrant h4 { font-size: 12px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
        .matrix-q1 { background: var(--error-soft); }
        .matrix-q1 h4 { color: var(--error); }
        .matrix-q2 { background: var(--warning-soft); }
        .matrix-q2 h4 { color: var(--warning); }
        .matrix-q3 { background: var(--info-soft); }
        .matrix-q3 h4 { color: var(--info); }
        .matrix-q4 { background: var(--bg-hover); }
        .matrix-q4 h4 { color: var(--muted); }
        .matrix-item { background: var(--bg-card); padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; }

        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { position: fixed; top: 0; right: 0; bottom: 0; width: 250px; transform: translateX(100%); transition: transform 0.2s; z-index: 100; box-shadow: -4px 0 24px rgba(0,0,0,0.1); }
            .sidebar.open { transform: translateX(0); }
            .mobile-menu-btn { display: inline-flex !important; }
            .topbar { padding: 12px 16px; }
            .content { padding: 16px; }
        }
        .mobile-menu-btn { display: none; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="back-btn" onclick="window.location.href='/dashboard.html'" title="חזרה לדאשבורד">

    <script>
        // Auth guard
        if (sessionStorage.getItem('pc_authenticated') !== 'true') {
            window.location.href = '/login.html';
        }

        // Tab metadata
        const TAB_META = {
            dashboard: { title: 'דאשבורד תפעול', subtitle: 'העוזר האישי ומנהל התפעול הדיגיטלי של העסק שלך' },
            time: { title: 'ניהול זמן', subtitle: 'תכנון יומי, מטריצת אייזנהאואר, וזיהוי עומסים' },
            tasks: { title: 'משימות', subtitle: 'Kanban + טבלה + תצוגות חכמות' },
            calendar: { title: 'יומן ופגישות', subtitle: 'תצוגת יומן + ניהול פגישות + סיכומי AI' },
            reminders: { title: 'תזכורות', subtitle: 'תזכורות חכמות לעצמך ולצוות' },
            clients: { title: 'לקוחות פעילים', subtitle: 'תמונת מצב מלאה לכל לקוח' },
            onboarding: { title: 'אונבורדינג', subtitle: 'תהליכי קליטה של לקוחות חדשים' },
            service: { title: 'שירות לקוחות', subtitle: 'ניהול פניות, סיווג, וזמני תגובה' },
            csm: { title: 'CSM והצלחת לקוח', subtitle: 'שביעות רצון, שימור, ואפסייל' },
            risks: { title: 'חריגות וסיכונים', subtitle: 'לקוחות בסיכון, תהליכים תקועים, פערים' },
            team: { title: 'ניהול צוות', subtitle: 'עומסים, ביצועים, המלצות העברה' },
            processes: { title: 'תהליכים ונהלים', subtitle: 'SOPs חיים שמתורגמים למשימות' },
            automations: { title: 'אוטומציות תפעוליות', subtitle: 'טריגרים → תנאים → פעולות' },
            documents: { title: 'מסמכים ואישורים', subtitle: 'מעקב אחרי מסמכים נדרשים מלקוחות' },
            chat: { title: 'צ׳אט תפעולי', subtitle: 'דבר עם הסוכן בשפה חופשית' },
            reports: { title: 'דוחות תפעול', subtitle: 'דוחות יומיים, שבועיים, וחודשיים' },
            integrations: { title: 'אינטגרציות עתידיות', subtitle: 'יומן, וואטסאפ, מייל, CRM ועוד' },
            portal: { title: 'פורטל לקוח עתידי', subtitle: 'מה הלקוח שלך יראה (בעתיד)' },
            biztype: { title: 'התאמה לסוג עסק', subtitle: 'תבניות מותאמות לפי תחום העסק' },
            settings: { title: 'הגדרות תפעול', subtitle: 'הגדרות כלליות + הרשאות' },
        };

        // Helpers (global)
        const fmt = (n) => (typeof n === 'number') ? n.toLocaleString('he-IL') : '-';
        const fmtPct = (n) => typeof n === 'number' ? n.toFixed(1) + '%' : '-';
        const trend = (n) => {
            if (n === 0 || n === null) return '<span class="kpi-trend flat">―</span>';
            const sign = n > 0 ? '+' : '';
            const cls = n > 0 ? 'up' : 'down';
            const arrow = n > 0 ? '▲' : '▼';
            return `<span class="kpi-trend ${cls}">${arrow} ${sign}${n}%</span>`;
        };

        // Tab system
        const TABS_OP = {};
        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
            document.getElementById('pageTitle').textContent = TAB_META[tabName].title;
            document.getElementById('pageSubtitle').textContent = TAB_META[tabName].subtitle;
            const content = document.getElementById('content');
            const renderer = TABS_OP[tabName];
            content.innerHTML = renderer ? renderer() : '<div class="placeholder-zone"><div class="ph-icon">🚧</div><div class="ph-title">בבנייה</div></div>';
            if (TABS_OP[tabName + '_after']) TABS_OP[tabName + '_after']();
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('content').scrollTo(0, 0);
        }
        document.querySelectorAll('.nav-tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
    </script>
    <script src="operational-agent-state.js"></script>
